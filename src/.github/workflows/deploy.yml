name: Deploy
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # Actualitzat a v4

      - name: Setup Node
        uses: actions/setup-node@v4 # Afegim aquest pas per fixar la versió
        with:
          node-version: 22 # Una versió estable i moderna

      - name: Install and Build
        run: |
          npm install --legacy-peer-deps
          npm run build
        env:
          VITE_BREVO_API_KEY: ${{ secrets.VITE_BREVO_API_KEY }}

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages