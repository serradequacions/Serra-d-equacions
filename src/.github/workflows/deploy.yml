name: Deploy
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install and Build
        run: |
          npm ci
          npm run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          target-folder: app

      - name: Copia fitxers destructor SW
        run: |
          cp public/sw-kill.js dist/sw-kill.js
          cp public/clear-cache.html dist/clear-cache.html
          cat > dist/index.html << 'EOF'
           <!DOCTYPE html><html><head>
          <meta charset="UTF-8">
          <script>
          if('caches'in window)caches.keys().then(k=>Promise.all(k.map(c=>caches.delete(c))));
          if('serviceWorker'in navigator)navigator.serviceWorker.getRegistrations().then(r=>r.forEach(x=>x.unregister()));
          window.location.replace('/Serra-d-equacions/clear-cache.html');
          </script></head><body></body></html>
          EOF