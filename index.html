<!DOCTYPE html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <script>
      // 1. Neteja immediata de Service Workers antics
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
            console.log('SW antic desregistrat');
          }
        });
      }

      // 2. Neteja de totes les memòries cau (Caches)
      if ('caches' in window) {
        caches.keys().then(function(names) {
          for (let name of names) {
            caches.delete(name);
            console.log('Cache esborrada:', name);
          }
        });
      }

      // 3. Opcional: Si detectem que estem a la ruta vella, forcem salt a la nova
      if (window.location.pathname.includes('/Serra-d-equacions/app/')) {
        window.location.replace('/Serra-d-equacions/app-v2/');
      }
    </script>

    <title>Serra d'equacions</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
