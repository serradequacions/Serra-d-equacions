<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0;url=/Serra-d-equacions/clear-cache.html">
  <title>Redirigint...</title>
</head>
<body>
  <script>
    // Per als que no tinguin JS desactivat, neteja ràpida
    if ('caches' in window) {
      caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k))));
    }
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(r => r.unregister());
      });
    }
    window.location.replace('/Serra-d-equacions/clear-cache.html');
  </script>
</body>
</html>
